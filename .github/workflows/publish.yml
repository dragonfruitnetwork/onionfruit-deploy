name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
      attestation:
        type: boolean
        default: true
        description: 'Enable attestation?'

permissions:
  id-token: write
  contents: write
  attestations: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    name: "Build, Archive & Upload"
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ONIONFRUIT_TEAM_CLIENT_ID }}
          private-key: ${{ secrets.ONIONFRUIT_TEAM_CLIENT_KEY }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet publish -c Release --no-self-contained -p:Version=${{ inputs.version }} -p:DebugType=None -p:UseAppHost=false -o ./pub-out DragonFruit.OnionFruit.Deploy.csproj

      - name: Archive
        run: cd pub-out && zip -r ../onionfruit-deploy.zip .

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        if: ${{ inputs.attestation }}
        with:
          subject-path: 'onionfruit-deploy.zip'

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: onionfruit-deploy.zip
          draft: true
          prerelease: true
          generate_release_notes: true
          name: ${{ inputs.version }}
          tag_name: ${{ inputs.version }}
          token: ${{ steps.app-token.outputs.token }}
